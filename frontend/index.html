<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Gestor de Llibres</title>
  <link rel="icon" type="image/png" href="../img/logo.png" />
  <link rel="stylesheet" href="https://milligram.io/styles/main.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h2>Gestor de Llibres</h2>
  </header>
  <div class="container">

    <!-- FILTRES + FORMULARI EN DUES COLUMNES -->
    <div class="dues-columnes">

      <!-- Filtratge -->
      <div class="card">
        <h4>Filtratge</h4>
        <label>Categoria</label>
        <select id="filtreCat">
          <option value="">Totes</option>
          <option value="Novel·la">Novel·la</option>
          <option value="Ciència ficció">Ciència ficció</option>
          <option value="Història">Història</option>
          <option value="Biografia">Biografia</option>
          <option value="Altres">Altres</option>
        </select>
        <label>Estat</label>
        <select id="filtreEstat">
          <option value="">Tots</option>
          <option value="pendent">Pendent</option>
          <option value="llegit">Llegit</option>
        </select>
        <br/>
        <button onclick="loadBooks()">Filtrar</button>
        <button class="button-outline" onclick="clearFiltres()">Netejar filtres</button>
      </div>

      <!-- Formulari -->
      <div class="card" id="formCard">
        <h4 id="formTitle">Nou llibre</h4>
        <input type="hidden" id="editId" />
        <label>Títol</label>
        <input type="text" id="titol" placeholder="Titol" />
        <label>Autor</label>
        <input type="text" id="autor" placeholder="Autor" />
        <label>Estat</label>
        <select id="estat">
          <option value="pendent">Pendent</option>
          <option value="llegit">Llegit</option>
        </select>
        <label>Valoració (1-5)</label>
        <input type="number" id="valoracio" min="1" max="5" />
        <label>Categoria</label>
        <select id="categoria">
          <option value="">Selecciona categoria</option>
          <option value="Novel·la">Novel·la</option>
          <option value="Ciència ficció">Ciència ficció</option>
          <option value="Història">Història</option>
          <option value="Biografia">Biografia</option>
          <option value="Altres">Altres</option>
        </select>
        <label>Persona</label>
        <input type="text" id="persona" placeholder="Persona" />
        <br/>
        <button onclick="saveBook()">Guardar</button>
        <button class="button-outline" onclick="resetForm()">Cancel·lar</button>
        <p id="missatge" class="missatge"></p>
      </div>

    </div>

    <!-- TAULA -->
    <table>
      <thead>
        <tr>
          <th>Títol</th>
          <th>Autor</th>
          <th>Estat</th>
          <th>Valoració</th>
          <th>Categoria</th>
          <th>Persona</th>
          <th>Accions</th>
        </tr>
      </thead>
      <tbody id="bodyLlibres"></tbody>
    </table>

  </div>
  <script src="app.js"></script>
</body>
</html>
